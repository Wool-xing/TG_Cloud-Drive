networks:
  tgpan:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tgpan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tgpan}
      POSTGRES_USER: ${DB_USER:-tgpan}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bind to loopback only by default. Backend reaches postgres via the
    # internal `tgpan` network using the service name `postgres:5432` —
    # external mapping is for local debugging tools (psql, DBeaver) ONLY.
    # NEVER use 0.0.0.0/host-public binding without a firewall rule.
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    networks:
      - tgpan
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tgpan} -d ${DB_NAME:-tgpan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tgpan_redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASS" ]; then redis-server --appendonly yes --requirepass "$$REDIS_PASS"; else redis-server --appendonly yes; fi'
    environment:
      REDIS_PASS: ${REDIS_PASS:-}
    volumes:
      - redis_data:/data
    # Same loopback-only policy as postgres above.
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - tgpan
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (NestJS) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: tgpan_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # NODE_ENV is governed by .env (env_file) so quickstart's dev mode
      # actually takes effect. Dockerfile sets NODE_ENV=production as the
      # image-level default for plain `docker run` use.
      DATABASE_URL: postgresql://${DB_USER:-tgpan}:${DB_PASS}@postgres:5432/${DB_NAME:-tgpan}
      # REDIS_PASS is read via env_file and passed to ioredis as a separate
      # option — no URL-encoding pain for passwords with special chars.
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tgpan
    healthcheck:
      # P1-I11: production node:20-alpine image does NOT ship wget; the old
      # wget-based check returned "command not found" → healthcheck flapped
      # "unhealthy" within seconds of boot. Use node's built-in http module.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend (Nginx / Static) ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
    container_name: tgpan_frontend
    restart: unless-stopped
    networks:
      - tgpan
    # Internal only – nginx reverse-proxies to this container on port 80

  # ── Nginx (Reverse Proxy / TLS Termination) ───────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tgpan_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certs — REQUIRED to start (nginx.conf has HTTPS as default).
      # For dev / first-run: generate self-signed pair with `make certs-dev`.
      # For prod: replace with Let's Encrypt / Cloudflare Origin / commercial CA.
      - ./certs:/etc/nginx/certs:ro
      # ACME webroot — used by certbot if you choose Let's Encrypt.
      - ./certs/acme-webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - tgpan
