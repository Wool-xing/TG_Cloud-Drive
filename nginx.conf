# ─────────────────────────────────────────────────────────────────────────────
# TG 云盘 — Nginx Reverse Proxy Configuration
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    server_tokens      off;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Upstream: NestJS Backend ──────────────────────────────────────────────
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    # ── Upstream: React Frontend (served by nginx in production) ─────────────
    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── Default client body size (for most requests) ──────────────────────────
    client_max_body_size 10m;

    # ── Common Security Headers (used in both HTTP-fallback and HTTPS server) ─
    # NOTE: defined as a snippet via map → never sent unconditionally; each
    # server block opts in via `add_header` lines below.

    # ── HTTP Server: ACME challenge + redirect to HTTPS ──────────────────────
    # In production, port 80 serves ONLY:
    #   1. ACME challenge for Let's Encrypt cert renewal
    #   2. 301 redirect to HTTPS for everything else
    # No application traffic goes over HTTP — password / JWT / file content
    # would otherwise be visible to any on-path attacker (the foundation of the
    # E2E encryption story collapses without TLS in transit).
    server {
        listen 80;
        server_name _;

        # ── Local health probe (Docker healthcheck) — does NOT redirect ──
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── ACME / Let's Encrypt webroot challenge ──────────────────────
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            access_log off;
        }

        # ── Everything else: 301 to HTTPS ────────────────────────────────
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server (default; requires certs at /etc/nginx/certs/*) ─────────
    # Generate dev certs (self-signed) with: make certs-dev
    # Production cert options: Let's Encrypt (certbot) / Cloudflare Origin Cert
    # / commercial CA — pick one and place fullchain.pem + privkey.pem under
    # the certs volume (see docker-compose.yml).
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ─────────────────────────────────────────────
        # HSTS: 2 years, includeSubDomains. NOT adding `preload` yet — once
        # submitted to browser preload lists it's a multi-year commitment.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
        # X-XSS-Protection is deprecated; relying on CSP / output escaping.

        # ── Health check (fast path, no upstream) ──────────────────────────
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── API: chunk upload (allow up to 30 MB per chunk) ───────────────
        location = /api/files/upload-chunk {
            client_max_body_size 30m;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_request_buffering off;
            proxy_read_timeout      300s;
            proxy_send_timeout      300s;
            proxy_connect_timeout   60s;
        }

        # ── API: all other routes ─────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
            proxy_connect_timeout  30s;

            # Don't buffer API responses
            proxy_buffering off;
        }

        # ── Static assets: aggressive caching ────────────────────────────
        location ~* \.(js|css|woff2?|ttf|eot|otf|ico|svg|webp|avif|png|jpg|jpeg|gif)$ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   Connection "";

            expires            1y;
            add_header         Cache-Control "public, immutable" always;
            access_log         off;
        }

        # ── Frontend SPA: all remaining paths ────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_intercept_errors on;
            # Fall back to index.html for SPA client-side routing
            error_page 404 = @spa_fallback;
        }

        # SPA fallback: serve index.html for any unknown path
        location @spa_fallback {
            rewrite            ^ /index.html break;
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   Connection "";
        }

        # ── Deny hidden files ──────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log  off;
            log_not_found off;
        }
    }
}
